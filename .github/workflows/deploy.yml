name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          NODE_ENV: production

      - name: List output directory
        run: |
          echo "--- root ---"
          ls -la
          echo "--- .output (if exists) ---"
          ls -la .output 2>/dev/null || echo "no .output folder"
          echo "--- .output/public (if exists) ---"
          ls -la .output/public 2>/dev/null || echo "no .output/public folder"
          echo "--- full .output tree ---"
          find .output 2>/dev/null | head -50 || echo "no .output at all"
          echo "--- full dist tree ---"
          find dist 2>/dev/null | head -50 || echo "no dist at all"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
